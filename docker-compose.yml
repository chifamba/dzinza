version: '3.8' # Specify Docker Compose version for better feature compatibility

services:
  # --- Databases & Infrastructure ---
  postgres:
    image: postgres:14.5-alpine # Using a specific version, 17.5 is very new. Let's use 14.5 for broader compatibility.
    container_name: dzinza-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-dzinza_db} # Main DB for auth if needed by other services too
      POSTGRES_USER: ${DB_USER:-dzinza_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 # Keep if your setup needs it
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d # For initial SQL scripts
    networks:
      - dzinza-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dzinza_user} -d ${DB_NAME:-dzinza_db}"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:6.0 # Using a specific version, 8.0 is very new. Let's use 6.0.
    container_name: dzinza-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-dzinza_user} # Re-using DB_USER for mongo admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      # Specific DBs will be created by services or init scripts if needed
      # MONGO_INITDB_DATABASE: ${MONGODB_GENEALOGY_DB:-dzinza_genealogy} # This creates one DB
    volumes:
      - mongodb_data:/data/db
      - ./database/mongo-init:/docker-entrypoint-initdb.d # For mongo init scripts (JS)
    networks:
      - dzinza-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.0-alpine # Using a specific version
    container_name: dzinza-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    # environment: # Not strictly needed if command sets password
      # REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - dzinza-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"] # Added password to ping
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.6.2 # Using a specific version, 9.0.2 is very new.
    container_name: dzinza-elasticsearch
    ports:
      - "9200:9200"
      # - "9300:9300" # Usually not needed for single node if HTTP is on 9200
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false" # For easier local dev; set to true with security for prod
      # ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-changeme} # If security enabled
      "ES_JAVA_OPTS": "-Xms512m -Xmx512m" # Adjust based on needs
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dzinza-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5 # Increased retries as ES can take time

  # --- Python Application Services ---
  auth-service-py:
    build:
      context: ./auth-service-py
      dockerfile: Dockerfile
    container_name: dzinza-auth-service-py
    ports:
      - "3002:3002" # Assuming Python service runs on 3002 internally
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # From .env.example of auth-service-py
      PROJECT_NAME: "Dzinza Auth Service PY"
      API_V1_STR: "/api/v1"
      ENVIRONMENT: "${NODE_ENV:-development}" # Use global NODE_ENV or default
      POSTGRES_SERVER: postgres # Service name in Docker network
      POSTGRES_USER: ${DB_USER:-dzinza_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dzinza_auth_db # Specific DB for auth service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0 # Auth service Redis DB
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      # Add other env vars from auth-service-py/.env.example (CORS, Email, Social, OTel)
      CORS_ORIGINS: "${CORS_ORIGINS_AUTH_PY:-http://localhost:3000,http://localhost:5173}"
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}" # Assuming jaeger service name
      OTEL_SERVICE_NAME: "auth-service-py"
    networks:
      - dzinza-network
    restart: unless-stopped
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "3002"] # Already in Dockerfile CMD

  genealogy-service-py:
    build:
      context: ./genealogy-service-py
      dockerfile: Dockerfile
    container_name: dzinza-genealogy-service-py
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      redis: # For Celery
        condition: service_healthy
      auth-service-py: # If it needs to validate tokens by calling auth-service (less ideal)
        condition: service_started # Or service_healthy if auth has health check
    environment:
      PROJECT_NAME: "Dzinza Genealogy Service PY"
      API_V1_STR: "/api/v1"
      ENVIRONMENT: "${NODE_ENV:-development}"
      MONGODB_URI: "mongodb://${DB_USER:-dzinza_user}:${MONGO_PASSWORD}@mongodb:27017/${MONGODB_GENEALOGY_DB:-dzinza_genealogy}?authSource=admin"
      MONGODB_DATABASE_NAME: ${MONGODB_GENEALOGY_DB:-dzinza_genealogy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CELERY: 1 # Separate DB for Celery
      AUTH_SERVICE_JWT_SECRET_KEY: ${JWT_SECRET_KEY} # For validating tokens locally
      ALGORITHM: "HS256"
      CORS_ORIGINS: "${CORS_ORIGINS_GENEALOGY_PY:-http://localhost:3000,http://localhost:5173}"
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}"
      OTEL_SERVICE_NAME: "genealogy-service-py"
      AUTH_SERVICE_BASE_URL: "http://auth-service-py:3002" # For potential direct calls
    networks:
      - dzinza-network
    restart: unless-stopped

  celery-worker-genealogy:
    build:
      context: ./genealogy-service-py # Uses same image as genealogy-service-py
      dockerfile: Dockerfile
    container_name: dzinza-celery-worker-genealogy
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "INFO", "-Q", "genealogy_tasks", "-c", "1"] # Example queue and concurrency
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      genealogy-service-py: # Ensure app code is built and potentially service is up
        condition: service_started
    environment:
      # Needs same env vars as genealogy-service-py for config, DB access, etc.
      PROJECT_NAME: "Dzinza Genealogy Worker" # Different name for clarity
      API_V1_STR: "/api/v1" # Not directly used by worker but config might load it
      ENVIRONMENT: "${NODE_ENV:-development}"
      MONGODB_URI: "mongodb://${DB_USER:-dzinza_user}:${MONGO_PASSWORD}@mongodb:27017/${MONGODB_GENEALOGY_DB:-dzinza_genealogy}?authSource=admin"
      MONGODB_DATABASE_NAME: ${MONGODB_GENEALOGY_DB:-dzinza_genealogy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CELERY: 1
      # JWT/Auth keys might not be needed by worker unless tasks validate tokens for some reason
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}"
      OTEL_SERVICE_NAME: "celery-worker-genealogy"
    networks:
      - dzinza-network
    restart: unless-stopped

  storage-service-py:
    build:
      context: ./storage-service-py
      dockerfile: Dockerfile
    container_name: dzinza-storage-service-py
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      # minio: # If using MinIO as a separate service for S3 dev
      #   condition: service_started
      auth-service-py:
        condition: service_started
    environment:
      PROJECT_NAME: "Dzinza Storage Service PY"
      API_V1_STR: "/api/v1"
      ENVIRONMENT: "${NODE_ENV:-development}"
      MONGODB_URI: "mongodb://${DB_USER:-dzinza_user}:${MONGO_PASSWORD}@mongodb:27017/${MONGODB_STORAGE_DB:-dzinza_storage}?authSource=admin"
      MONGODB_DATABASE_NAME: ${MONGODB_STORAGE_DB:-dzinza_storage}
      AUTH_SERVICE_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: "HS256"
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL_PY:-http://minio:9000} # Default to MinIO service if used
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID_PY:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY_PY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME_PY:-dzinza-storage}
      S3_REGION_NAME: ${S3_REGION_NAME_PY:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL_PY:-false}
      S3_VERIFY_SSL: ${S3_VERIFY_SSL_PY:-false}
      LOCAL_STORAGE_PATH: "/app/uploads" # Path inside container
      TEMP_UPLOAD_PATH: "/app/tmp_uploads" # Path inside container
      CLEANUP_SCHEDULE_CRON: "0 3 * * *" # Daily at 3 AM
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}"
      OTEL_SERVICE_NAME: "storage-service-py"
    volumes: # If using local storage, map volumes
      - local_uploads:/app/uploads # Persist uploads if LOCAL_STORAGE_PATH is used by service
      - local_tmp_uploads:/app/tmp_uploads # For temp processing files
    networks:
      - dzinza-network
    restart: unless-stopped

  search-service-py:
    build:
      context: ./search-service-py
      dockerfile: Dockerfile
    container_name: dzinza-search-service-py
    ports:
      - "3003:3003"
    depends_on:
      elasticsearch:
        condition: service_healthy
      # mongodb: # If search service uses its own Mongo instance for analytics
      #   condition: service_healthy
      auth-service-py:
        condition: service_started
      genealogy-service-py: # For data indexing, if done via API pull
        condition: service_started
    environment:
      PROJECT_NAME: "Dzinza Search Service PY"
      API_V1_STR: "/api/v1"
      ENVIRONMENT: "${NODE_ENV:-development}"
      ELASTICSEARCH_URL: "http://elasticsearch:9200" # Internal Docker network URL
      PERSON_INDEX_NAME: "dzinza_persons"
      FAMILY_TREE_INDEX_NAME: "dzinza_family_trees"
      # MONGODB_URI: # If used by search service
      # MONGODB_DATABASE_NAME:
      AUTH_SERVICE_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: "HS256"
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}"
      OTEL_SERVICE_NAME: "search-service-py"
      GENEALOGY_SERVICE_BASE_URL: "http://genealogy-service-py:3004"
      STORAGE_SERVICE_BASE_URL: "http://storage-service-py:3005"
      INDEXING_BATCH_SIZE: 100
    networks:
      - dzinza-network
    restart: unless-stopped

  backend-service-py: # API Gateway
    build:
      context: ./backend-service-py
      dockerfile: Dockerfile
    container_name: dzinza-api-gateway-py
    ports:
      - "3001:3001" # Main entry point for API requests
    depends_on: # Depends on all services it proxies to
      - auth-service-py
      - genealogy-service-py
      - storage-service-py
      - search-service-py
    environment:
      PROJECT_NAME: "Dzinza API Gateway PY"
      API_V1_PREFIX: "/api" # Gateway's own prefix where it serves proxied routes
      ENVIRONMENT: "${NODE_ENV:-development}"
      SERVICES_AUTH_SERVICE_URL: "http://auth-service-py:3002" # Service root
      SERVICES_GENEALOGY_SERVICE_URL: "http://genealogy-service-py:3004"
      SERVICES_STORAGE_SERVICE_URL: "http://storage-service-py:3005"
      SERVICES_SEARCH_SERVICE_URL: "http://search-service-py:3003"
      # Optional: If gateway validates tokens (AUTH_SERVICE_JWT_SECRET_KEY, ALGORITHM)
      AUTH_SERVICE_JWT_SECRET_KEY: ${JWT_SECRET_KEY} # Enable gateway validation
      ALGORITHM: "HS256"
      CORS_ORIGINS: "${CORS_ORIGINS_GATEWAY_PY:-http://localhost:3000,http://localhost:5173,http://localhost:8080,http://frontend:80}" # Allow frontend and local dev
      ENABLE_TRACING: "${ENABLE_TRACING:-false}"
      JAEGER_ENDPOINT: "${JAEGER_ENDPOINT:-http://jaeger:4318/v1/traces}"
      OTEL_SERVICE_NAME: "api-gateway-py"
      SERVICE_REQUEST_TIMEOUT: "15.0"
    networks:
      - dzinza-network
    restart: unless-stopped
    labels: # For Traefik if used as main entry point
      - "traefik.enable=true"
      - "traefik.http.routers.apigateway.rule=Host(`${DOMAIN:-dzinza.local}`) && PathPrefix(`/api`)"
      - "traefik.http.services.apigateway.loadbalancer.server.port=3001"


  # --- Frontend & Observability (mostly from original, with adjustments) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dzinza-frontend
    ports:
      - "8080:80" # Expose on 8080, Traefik can route from 80
    depends_on: # Should depend on the API gateway
      - backend-service-py
    environment:
      # Frontend needs to know where the API gateway is.
      # If served on same domain by Traefik, API calls might be relative /api
      # Or explicitly set:
      REACT_APP_API_BASE_URL: "http://${DOMAIN:-dzinza.local}/api" # If Traefik handles routing
      # REACT_APP_API_BASE_URL: "http://localhost:3001/api" # If accessing gateway directly on localhost:3001
      NODE_ENV: production # Assuming production build for frontend
      REACT_APP_ENVIRONMENT: production
    networks:
      - dzinza-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-dzinza.local}`)" # Serves root
      - "traefik.http.services.frontend.loadbalancer.server.port=80" # Nginx inside frontend container listens on 80

  # Traefik (Optional Reverse Proxy - useful for local dev with hostnames)
  # traefik:
  #   image: traefik:v2.10
  #   container_name: dzinza-traefik
  #   command:
  #     - "--api.insecure=true" # Enable Traefik dashboard (for dev)
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.web.address=:80"
  #   ports:
  #     - "80:80"     # HTTP
  #     - "8081:8080" # Traefik dashboard
  #   volumes:
  #     - "/var/run/docker.sock:/var/run/docker.sock:ro"
  #   networks:
  #     - dzinza-network
  #   restart: unless-stopped

  # Jaeger (For OpenTelemetry Tracing) - Add if not present
  jaeger:
    image: jaegertracing/all-in-one:1.50 # Use a recent version
    container_name: dzinza-jaeger
    ports:
      - "6831:6831/udp"  # Agent (jaeger protocol)
      - "16686:16686"    # UI
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - dzinza-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.45.0 # Using a specific version
    container_name: dzinza-prometheus
    ports:
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      - ./prometheus:/etc/prometheus/ # Mount whole dir for prometheus.yml and rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # These console paths might not be needed for newer Prometheus versions or basic setup
      # - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      # - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - dzinza-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:9.5.3 # Using a specific version
    container_name: dzinza-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin} # Default password if not set
      GF_USERS_ALLOW_SIGN_UP: "false"
      # GF_AUTH_ANONYMOUS_ENABLED: "true" # If you want anonymous access
      # GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      - dzinza-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongodb_data:
  # redis_data: # Redis data persistence is optional for cache, but good for session store if used
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  local_uploads: # For storage-service-py if using local disk
  local_tmp_uploads: # For storage-service-py temp files

networks:
  dzinza-network:
    driver: bridge
    # ipam: # Static IPAM config can be useful but often not strictly necessary
    #   config:
    #     - subnet: 172.20.0.0/16
